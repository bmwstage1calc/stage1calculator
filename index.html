<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMW Stage1 Calculator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: white;
      text-align: center;
    }

    .language-switcher {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 999;
    }

    .language-switcher select {
      width: auto;
      max-width: none;
      padding: 6px 8px;
      font-size: 13px;
      background: #102542;
      color: white;
      border: 1px solid #00a3ff;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 25px;
    }

    h1 {
      color: #00a3ff;
      margin-bottom: 10px;
      padding-top: 15px;
    }

    .subtitle {
      color: #cccccc;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      max-width: 650px;
      padding: 14px;
      font-size: 17px;
      background: #102542;
      color: white;
      border: 1px solid #00a3ff;
      border-radius: 8px;
      margin: 8px 0;
      outline: none;
    }

    #carList {
      width: 90%;
      max-width: 800px;
      height: 180px;
      overflow-y: auto;
      margin: 20px auto;
      text-align: left;
      border: 1px solid #00a3ff;
      border-radius: 8px;
      background: #151922;
    }

    .car-item {
      background: #151922;
      padding: 12px;
      margin-bottom: 0;
      cursor: pointer;
      border-bottom: 1px solid #24324a;
    }

    .car-item:hover {
      background: #1d2430;
      color: #00a3ff;
    }

    #result {
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
      background: #151922;
      padding: 20px;
      border-radius: 10px;
      text-align: left;
      white-space: pre-line;
      font-size: 17px;
      line-height: 1.5;
      min-height: 120px;
    }

    .error {
      color: #ff6060;
      font-weight: bold;
    }

    footer {
      color: #888888;
      margin-top: 25px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="language-switcher">
    <select id="language">
      <option value="ru">🇷🇺 RU</option>
      <option value="en">🇬🇧 EN</option>
    </select>
  </div>

  <div class="app">
    <h1>BMW Stage1 Calculator</h1>

    <div class="subtitle">
      BMW Performance Database 1996–2025
    </div>

    <input
      id="search"
      type="text"
      placeholder="Поиск BMW / кузов / двигатель"
      autocomplete="off"
    >

    <div id="carList"></div>

    <div id="result">Загружаю базу BMW...</div>

    <footer id="footer">BMW Performance Database</footer>
  </div>

  <script>
    let cars = [];
    let filteredCars = [];
    let selectedCar = null;
    let currentLang = "ru";

    const translations = {
      ru: {
        search: "Поиск BMW / кузов / двигатель",
        model: "Модель",
        body: "Кузов",
        engine: "Двигатель",
        family: "Серия двигателя",
        stock: "Завод",
        stage1: "Stage 1",
        hpGain: "Прирост мощности",
        nmGain: "Прирост момента",
        hp: "л.с.",
        nm: "Нм",
        choose: "Выбери автомобиль из списка",
        loaded: "База загружена. Выбери автомобиль из списка.",
        notFound: "Ничего не найдено",
        loadError: "Ошибка: не удалось загрузить bmw_database.csv",
        footer: "BMW Performance Database 1996–2025 | Моделей в базе"
      },
      en: {
        search: "Search BMW / body / engine",
        model: "Model",
        body: "Body",
        engine: "Engine",
        family: "Engine family",
        stock: "Stock",
        stage1: "Stage 1",
        hpGain: "Power gain",
        nmGain: "Torque gain",
        hp: "hp",
        nm: "Nm",
        choose: "Select a car from the list",
        loaded: "Database loaded. Select a car from the list.",
        notFound: "Nothing found",
        loadError: "Error: failed to load bmw_database.csv",
        footer: "BMW Performance Database 1996–2025 | Models in database"
      }
    };

    function engineFamily(engine) {
      if (!engine) return "-";
      if (engine === "Electric") return "Electric";
      if (engine.toLowerCase().includes("hybrid")) return "Hybrid";
      return engine.substring(0, 3);
    }

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    async function loadCSV() {
      try {
        const response = await fetch("bmw_database.csv");

        if (!response.ok) {
          throw new Error("CSV not found");
        }

        const text = await response.text();

        const lines = text
          .replace(/\r/g, "")
          .split("\n")
          .map(line => line.trim())
          .filter(line => line !== "");

        const headers = parseCSVLine(lines[0]);

        cars = lines.slice(1).map(line => {
          const values = parseCSVLine(line);
          const car = {};

          headers.forEach((header, index) => {
            car[header] = values[index] || "";
          });

          return car;
        }).filter(car =>
          car.model &&
          car.body &&
          car.engine &&
          car.stock_hp &&
          car.stock_nm &&
          car.stage1_hp &&
          car.stage1_nm
        );

        filteredCars = [...cars];

        updateList();

        document.getElementById("result").innerText =
          translations[currentLang].loaded;

        updateFooter();

      } catch (error) {
        document.getElementById("result").innerHTML =
          `<span class="error">${translations[currentLang].loadError}</span>`;
        console.error(error);
      }
    }

    function updateFooter() {
      document.getElementById("footer").innerText =
        `${translations[currentLang].footer}: ${cars.length}`;
    }

    function updateList() {
      const searchValue = document.getElementById("search").value.toLowerCase();
      const list = document.getElementById("carList");

      list.innerHTML = "";

      filteredCars = cars.filter(car => {
        const fullName =
          `${car.model} ${car.body} ${car.engine}`.toLowerCase();

        return fullName.includes(searchValue);
      });

      if (filteredCars.length === 0) {
        list.innerHTML = `<div class="car-item">${translations[currentLang].notFound}</div>`;
        return;
      }

      filteredCars.forEach(car => {
        const item = document.createElement("div");
        item.className = "car-item";
        item.textContent = `${car.model} | ${car.body} | ${car.engine}`;

        item.addEventListener("click", () => {
          selectedCar = car;
          calculate();
        });

        list.appendChild(item);
      });
    }

    function calculate() {
      if (!selectedCar) {
        alert(translations[currentLang].choose);
        return;
      }

      const car = selectedCar;

      const stockHp = Number(car.stock_hp);
      const stockNm = Number(car.stock_nm);
      const stage1Hp = Number(car.stage1_hp);
      const stage1Nm = Number(car.stage1_nm);

      if (!stockHp || !stockNm || !stage1Hp || !stage1Nm) {
        document.getElementById("result").innerHTML =
          `<span class="error">Ошибка данных в CSV для этой модели</span>`;
        return;
      }

      const hpGain = stage1Hp - stockHp;
      const nmGain = stage1Nm - stockNm;

      const hpPercent = ((hpGain / stockHp) * 100).toFixed(1);
      const nmPercent = ((nmGain / stockNm) * 100).toFixed(1);

      const t = translations[currentLang];

      document.getElementById("result").innerText =
`${t.model}: ${car.model}
${t.body}: ${car.body}
${t.engine}: ${car.engine}
${t.family}: ${engineFamily(car.engine)}

${t.stock}: ${stockHp} ${t.hp} / ${stockNm} ${t.nm}
${t.stage1}: ${stage1Hp} ${t.hp} / ${stage1Nm} ${t.nm}

${t.hpGain}: +${hpGain} ${t.hp} (${hpPercent}%)
${t.nmGain}: +${nmGain} ${t.nm} (${nmPercent}%)`;
    }

    function changeLanguage() {
      currentLang = document.getElementById("language").value;

      document.getElementById("search").placeholder =
        translations[currentLang].search;

      updateFooter();
      updateList();

      if (selectedCar) {
        calculate();
      }
    }

    document.getElementById("search").addEventListener("input", updateList);
    document.getElementById("language").addEventListener("change", changeLanguage);

    loadCSV();
  </script>
</body>
</html>
