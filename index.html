<script>
  let cars = [];
  let filteredCars = [];
  let selectedCar = null;
  let currentLang = "ru";

  const translations = {
    ru: {
      search: "Поиск BMW / кузов / двигатель",
      model: "Модель",
      body: "Кузов",
      engine: "Двигатель",
      engineCode: "Маркировка двигателя",
      family: "Серия двигателя",
      stock: "Завод",
      stage1: "Stage 1",
      hpGain: "Прирост мощности",
      nmGain: "Прирост момента",
      hp: "л.с.",
      nm: "Нм",
      choose: "Выбери автомобиль из списка",
      footer: "BMW Performance Database 1996–2025 | Моделей в базе"
    },
    en: {
      search: "Search BMW / body / engine",
      model: "Model",
      body: "Body",
      engine: "Engine",
      engineCode: "Engine code",
      family: "Engine family",
      stock: "Stock",
      stage1: "Stage 1",
      hpGain: "Power gain",
      nmGain: "Torque gain",
      hp: "hp",
      nm: "Nm",
      choose: "Select a car from the list",
      footer: "BMW Performance Database 1996–2025 | Models in database"
    }
  };

  function engineFamily(engineCode) {
    if (!engineCode) return "-";
    if (engineCode === "Electric") return "Electric";
    if (engineCode.includes("Hybrid")) return "Hybrid";
    return engineCode.substring(0, 3);
  }

  function changeLanguage() {
    currentLang = document.getElementById("language").value;
    document.getElementById("search").placeholder = translations[currentLang].search;
    document.getElementById("footer").innerText =
      `${translations[currentLang].footer}: ${cars.length}`;

    if (selectedCar) calculate();
  }

  async function loadCSV() {
    const response = await fetch("bmw_database.csv");
    const text = await response.text();

    const lines = text
      .replace(/\r/g, "")
      .trim()
      .split("\n")
      .filter(line => line.trim() !== "");

    const headers = lines[0].split(",").map(h => h.trim());

    cars = lines.slice(1).map(line => {
      const values = line.split(",").map(v => v.trim());
      let car = {};

      headers.forEach((header, index) => {
        car[header] = values[index];
      });

      car.engine = engineFamily(car.engine_code);

      return car;
    });

    filteredCars = [...cars];
    updateList();

    document.getElementById("footer").innerText =
      `${translations[currentLang].footer}: ${cars.length}`;
  }

  function updateList() {
    const search = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("carList");

    list.innerHTML = "";

    filteredCars = cars.filter(car => {
      if (!car.model || !car.body || !car.engine_code) return false;

      const fullName =
        `${car.model} ${car.body} ${car.engine} ${car.engine_code}`.toLowerCase();

      return fullName.includes(search);
    });

    filteredCars.forEach(car => {
      const item = document.createElement("div");
      item.className = "car-item";
      item.textContent = `${car.model} | ${car.body} | ${car.engine_code}`;

      item.onclick = () => {
        selectedCar = car;
        calculate();
      };

      list.appendChild(item);
    });
  }

  function calculate() {
    const car = selectedCar;
    if (!car) return alert(translations[currentLang].choose);

    const stockHp = Number(car.stock_hp);
    const stockNm = Number(car.stock_nm);
    const stage1Hp = Number(car.stage1_hp);
    const stage1Nm = Number(car.stage1_nm);

    const hpGain = stage1Hp - stockHp;
    const nmGain = stage1Nm - stockNm;

    const hpPercent = ((hpGain / stockHp) * 100).toFixed(1);
    const nmPercent = ((nmGain / stockNm) * 100).toFixed(1);

    const t = translations[currentLang];

    document.getElementById("result").innerText =
`${t.model}: ${car.model}
${t.body}: ${car.body}
${t.engine}: ${car.engine}
${t.engineCode}: ${car.engine_code}
${t.family}: ${engineFamily(car.engine_code)}

${t.stock}: ${stockHp} ${t.hp} / ${stockNm} ${t.nm}
${t.stage1}: ${stage1Hp} ${t.hp} / ${stage1Nm} ${t.nm}

${t.hpGain}: +${hpGain} ${t.hp} (${hpPercent}%)
${t.nmGain}: +${nmGain} ${t.nm} (${nmPercent}%)`;
  }

  document.getElementById("search").addEventListener("input", updateList);

  loadCSV();
</script>
